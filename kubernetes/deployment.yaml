apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-frontend
  namespace: social-platform
  labels:
    app: social-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: social-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: social-frontend
    spec:
      containers:
        - name: social-frontend
          image: social-frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health # Ensure this endpoint exists or use /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001
